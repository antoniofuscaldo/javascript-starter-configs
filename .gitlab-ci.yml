stages: [tsc, build, deploy]

variables:
  # Speed up cache/artifact handling (runner feature)
  FF_USE_FASTZIP: "true"
  CACHE_COMPRESSION_LEVEL: "fast"
  ARTIFACT_COMPRESSION_LEVEL: "fast"

  # Make npm use a project-local cache we can persist
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"
  NPM_CONFIG_FUND: "false"
  NPM_CONFIG_AUDIT: "false"
  NPM_CONFIG_PROGRESS: "true"
  NPM_CONFIG_LOGLEVEL: "warn"

# Definizioni predefinite per tutti i job
default:
  image: node:24
  before_script:
    - |
      cat > .npmrc <<EOF
      registry=URL
      EOF
    - node -v && npm -v
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - .npm/ # npm download cache
      - node_modules/.vite/ # vite/rollup cache (if exists)
      - .vite/ # vite/rollup cache (if exists)

tsc:
  stage: tsc
  script:
    - echo "TypeScript running..."
    - npm ci --cache .npm --prefer-offline
    - npm run tsgo
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
      
knip: 
  stage: knip
  script: 
    - pnpm knip:check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always

build:
  stage: build
  script:
    - echo "VITE_SOMETHING=value" >> .env
    - npm ci --cache .npm --prefer-offline
    - npm run build-no-tsc
  artifacts:
    paths:
      - dist/assets
      - dist/index.html
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        ENVIRONMENT: "staging"
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        ENVIRONMENT: "dev"
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      variables:
        ENVIRONMENT: "dev"
      when: always
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      variables:
        ENVIRONMENT: "production"
      when: always
    - when: never
  environment:
    name: $ENVIRONMENT

deploy:
  stage: deploy
  image: registry.gitlab.com/gitlab-org/cloud-deploy/aws-base:latest
  cache: {}
  before_script: []
  needs: ["build"]
  script:
    - aws s3 cp dist/assets s3://$S3_BUCKET_NAME/assets --recursive
    - aws s3 cp dist/index.html s3://$S3_BUCKET_NAME/index.html
    - aws cloudfront create-invalidation --distribution-id $CLOUDFRONT_DISTRIBUTION_ID --paths "/*"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        ENVIRONMENT: "staging"
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      variables:
        ENVIRONMENT: "dev"
      when: always
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
      variables:
        ENVIRONMENT: "production"
      when: always
    - when: never
  environment:
    name: $ENVIRONMENT
